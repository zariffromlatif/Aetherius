name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Lint
        run: ruff check aetherius
      - name: Test
        run: |
          export PYTHONPATH=$PWD/aetherius
          pytest -q aetherius/tests
