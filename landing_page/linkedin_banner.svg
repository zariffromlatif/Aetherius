<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <linearGradient id="brassV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B8893A"/>
      <stop offset="50%" stop-color="#E7C67A"/>
      <stop offset="100%" stop-color="#B8893A"/>
    </linearGradient>
  </defs>

  <!-- Ink-navy paper -->
  <rect width="1584" height="396" fill="#141A24"/>

  <!-- Subtle warm-white dot grid across the top -->
  <g fill="rgba(232,227,216,0.06)">
    <circle cx="80" cy="44" r="1.3"/><circle cx="160" cy="44" r="1.3"/><circle cx="240" cy="44" r="1.3"/>
    <circle cx="320" cy="44" r="1.3"/><circle cx="400" cy="44" r="1.3"/><circle cx="480" cy="44" r="1.3"/>
    <circle cx="560" cy="44" r="1.3"/><circle cx="640" cy="44" r="1.3"/><circle cx="720" cy="44" r="1.3"/>
    <circle cx="800" cy="44" r="1.3"/><circle cx="880" cy="44" r="1.3"/><circle cx="960" cy="44" r="1.3"/>
    <circle cx="1040" cy="44" r="1.3"/><circle cx="1120" cy="44" r="1.3"/><circle cx="1200" cy="44" r="1.3"/>
    <circle cx="1280" cy="44" r="1.3"/><circle cx="1360" cy="44" r="1.3"/><circle cx="1440" cy="44" r="1.3"/>
    <circle cx="1520" cy="44" r="1.3"/>
  </g>

  <!-- Brass spine on the left -->
  <rect x="0" y="0" width="8" height="396" fill="url(#brassV)"/>

  <!-- Top-left brass ticks -->
  <path d="M96 40 L96 68 M96 40 L124 40" stroke="#B8893A" stroke-width="2" fill="none"/>
  <!-- Bottom-right brass ticks -->
  <path d="M1520 356 L1520 328 M1520 356 L1492 356" stroke="#B8893A" stroke-width="2" fill="none"/>

  <!-- ============================================================
       Region A — brand block, TOP-LEFT.
       Kept in the top-left; LinkedIn overlays the circular avatar
       over the BOTTOM-left, so nothing critical goes below ~y=250 here.
       ============================================================ -->
  <text x="96" y="72"
        font-family="'Inter', sans-serif"
        font-size="15"
        font-weight="600"
        letter-spacing="7"
        fill="#B8893A">DOWNSIDE-RISK INTELLIGENCE</text>

  <text x="94" y="150"
        font-family="'Playfair Display', Georgia, serif"
        font-size="80"
        font-weight="700"
        fill="#FBFAF7"
        letter-spacing="-2">Aetherius</text>
  <text x="98" y="192"
        font-family="'Playfair Display', Georgia, serif"
        font-style="italic"
        font-size="26"
        font-weight="500"
        fill="#C9C3B6">Risk Intelligence</text>

  <!-- ============================================================
       Region B — value prop, RIGHT two-thirds (top)
       ============================================================ -->
  <text x="636" y="100"
        font-family="'Playfair Display', Georgia, serif"
        font-size="31"
        font-weight="500"
        fill="#FBFAF7"
        letter-spacing="-0.5">Backtest-validated downside-risk screens</text>
  <text x="636" y="142"
        font-family="'Playfair Display', Georgia, serif"
        font-style="italic"
        font-size="28"
        font-weight="500"
        fill="#C9C3B6">for concentrated public-equity books.</text>

  <!-- ============================================================
       Region C — metric strip, RIGHT — horizontal three-up
       ============================================================ -->
  <g transform="translate(636 174)">
    <rect x="0" y="0" width="856" height="150" fill="none" stroke="#B7AE9C" stroke-width="1"/>
    <path d="M0 0 L0 15 M0 0 L15 0" stroke="#B8893A" stroke-width="2.5" fill="none"/>
    <path d="M856 150 L856 135 M856 150 L841 150" stroke="#B8893A" stroke-width="2.5" fill="none"/>

    <text x="24" y="34"
          font-family="'Inter', sans-serif"
          font-size="13"
          font-weight="600"
          letter-spacing="3"
          fill="#B8893A">DETECTION TIMING · 3 HISTORICAL CRISES</text>
    <line x1="24" y1="46" x2="832" y2="46" stroke="#FBFAF7" stroke-width="1.5"/>

    <!-- Metric 1 -->
    <text x="24" y="108"
          font-family="'Playfair Display', Georgia, serif"
          font-size="50"
          font-weight="700"
          fill="#FBFAF7">9 / 9</text>
    <text x="24" y="132" font-family="'Inter', sans-serif" font-size="12.5" fill="#C9C3B6">affected names detected</text>

    <line x1="290" y1="64" x2="290" y2="134" stroke="#3B4553" stroke-width="1"/>

    <!-- Metric 2 -->
    <text x="314" y="108"
          font-family="'Playfair Display', Georgia, serif"
          font-size="50"
          font-weight="700"
          fill="#FBFAF7">2.5<tspan font-size="24" fill="#C9C3B6"> d</tspan></text>
    <text x="314" y="132" font-family="'Inter', sans-serif" font-size="12.5" fill="#C9C3B6">median lead time</text>

    <line x1="566" y1="64" x2="566" y2="134" stroke="#3B4553" stroke-width="1"/>

    <!-- Metric 3 -->
    <text x="590" y="108"
          font-family="'Playfair Display', Georgia, serif"
          font-size="50"
          font-weight="700"
          fill="#FBFAF7">0</text>
    <text x="590" y="132" font-family="'Inter', sans-serif" font-size="12.5" fill="#C9C3B6">false positives on controls</text>
  </g>

  <!-- Bottom-right byline -->
  <text x="636" y="356"
        font-family="'Inter', sans-serif"
        font-size="14"
        letter-spacing="0.5"
        fill="#9AA0A8">SVB 2023 · Wirecard 2020 · FTX 2022 · Open source, Apache-2.0</text>
</svg>
