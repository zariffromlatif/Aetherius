<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B8893A"/>
      <stop offset="50%" stop-color="#E7C67A"/>
      <stop offset="100%" stop-color="#B8893A"/>
    </linearGradient>
  </defs>

  <!-- Ink-navy paper -->
  <rect width="1200" height="630" fill="#141A24"/>

  <!-- Subtle warm-white paper feel via low-alpha dot grid -->
  <g fill="rgba(232,227,216,0.06)">
    <circle cx="60" cy="60" r="1.3"/><circle cx="140" cy="60" r="1.3"/><circle cx="220" cy="60" r="1.3"/>
    <circle cx="300" cy="60" r="1.3"/><circle cx="380" cy="60" r="1.3"/><circle cx="460" cy="60" r="1.3"/>
    <circle cx="540" cy="60" r="1.3"/><circle cx="620" cy="60" r="1.3"/><circle cx="700" cy="60" r="1.3"/>
    <circle cx="780" cy="60" r="1.3"/><circle cx="860" cy="60" r="1.3"/><circle cx="940" cy="60" r="1.3"/>
    <circle cx="1020" cy="60" r="1.3"/><circle cx="1100" cy="60" r="1.3"/>
  </g>

  <!-- Brass spine on the left -->
  <rect x="0" y="0" width="8" height="630" fill="url(#brass)"/>

  <!-- Publisher line running down the far left -->
  <g transform="translate(38 460) rotate(-90)">
    <text x="0" y="0"
          font-family="'Inter', sans-serif"
          font-size="15"
          font-weight="600"
          letter-spacing="6"
          fill="#B8893A"
          opacity="0.75">VOL. I  ·  MMXXVI  ·  AETHERIUS RISK INTELLIGENCE</text>
  </g>

  <!-- Top-left brass ticks -->
  <path d="M96 60 L96 90 M96 60 L126 60" stroke="#B8893A" stroke-width="2" fill="none"/>
  <!-- Bottom-right brass ticks -->
  <path d="M1140 570 L1140 540 M1140 570 L1110 570" stroke="#B8893A" stroke-width="2" fill="none"/>

  <!-- Publication mark -->
  <text x="96" y="130"
        font-family="'Inter', sans-serif"
        font-size="16"
        font-weight="600"
        letter-spacing="8"
        fill="#B8893A"
        text-transform="uppercase">DOWNSIDE-RISK INTELLIGENCE</text>

  <!-- Wordmark -->
  <text x="96" y="230"
        font-family="'Playfair Display', Georgia, serif"
        font-size="88"
        font-weight="700"
        fill="#FBFAF7"
        letter-spacing="-2">Aetherius</text>
  <text x="96" y="272"
        font-family="'Playfair Display', Georgia, serif"
        font-style="italic"
        font-size="28"
        font-weight="500"
        fill="#C9C3B6">Risk Intelligence</text>

  <!-- Divider -->
  <line x1="96" y1="310" x2="336" y2="310" stroke="#B8893A" stroke-width="2"/>

  <!-- Value prop -->
  <text x="96" y="360"
        font-family="'Playfair Display', Georgia, serif"
        font-size="32"
        font-weight="500"
        fill="#FBFAF7"
        letter-spacing="-0.5">
    Backtest-validated downside-risk
  </text>
  <text x="96" y="402"
        font-family="'Playfair Display', Georgia, serif"
        font-size="32"
        font-weight="500"
        fill="#FBFAF7"
        letter-spacing="-0.5">
    screens for concentrated
  </text>
  <text x="96" y="444"
        font-family="'Playfair Display', Georgia, serif"
        font-style="italic"
        font-size="28"
        font-weight="500"
        fill="#C9C3B6">
    public-equity books.
  </text>

  <!-- Metric strip on the right -->
  <g transform="translate(770 130)">
    <!-- Card border -->
    <rect x="0" y="0" width="330" height="440" fill="none" stroke="#B7AE9C" stroke-width="1"/>
    <!-- Brass corner ticks -->
    <path d="M0 0 L0 16 M0 0 L16 0" stroke="#B8893A" stroke-width="2.5" fill="none"/>
    <path d="M330 440 L330 424 M330 440 L314 440" stroke="#B8893A" stroke-width="2.5" fill="none"/>

    <text x="24" y="46"
          font-family="'Inter', sans-serif"
          font-size="13"
          font-weight="600"
          letter-spacing="3"
          fill="#B8893A">DETECTION TIMING</text>

    <text x="24" y="76"
          font-family="'Playfair Display', Georgia, serif"
          font-size="20"
          font-weight="600"
          fill="#FBFAF7">3 historical crises</text>

    <line x1="24" y1="98" x2="306" y2="98" stroke="#FBFAF7" stroke-width="2"/>

    <!-- Metric 1 -->
    <text x="24" y="150"
          font-family="'Playfair Display', Georgia, serif"
          font-size="60"
          font-weight="700"
          fill="#FBFAF7">9 / 9</text>
    <text x="24" y="178"
          font-family="'Inter', sans-serif"
          font-size="14"
          fill="#C9C3B6">affected names detected</text>

    <line x1="24" y1="208" x2="306" y2="208" stroke="#3B4553" stroke-width="1"/>

    <!-- Metric 2 -->
    <text x="24" y="256"
          font-family="'Playfair Display', Georgia, serif"
          font-size="60"
          font-weight="700"
          fill="#FBFAF7">2.5 <tspan font-size="30" fill="#C9C3B6">days</tspan></text>
    <text x="24" y="284"
          font-family="'Inter', sans-serif"
          font-size="14"
          fill="#C9C3B6">median lead time</text>

    <line x1="24" y1="314" x2="306" y2="314" stroke="#3B4553" stroke-width="1"/>

    <!-- Metric 3 -->
    <text x="24" y="362"
          font-family="'Playfair Display', Georgia, serif"
          font-size="60"
          font-weight="700"
          fill="#FBFAF7">0</text>
    <text x="24" y="390"
          font-family="'Inter', sans-serif"
          font-size="14"
          fill="#C9C3B6">false positives on controls</text>
  </g>

  <!-- Bottom byline -->
  <text x="96" y="570"
        font-family="'Inter', sans-serif"
        font-size="15"
        letter-spacing="1"
        fill="#9AA0A8">SVB 2023  ·  Wirecard 2020  ·  FTX 2022  ·  Full pipeline open source, Apache-2.0</text>
</svg>
